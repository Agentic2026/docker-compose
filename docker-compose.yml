services:
  reverse-proxy:
    image: nginx:1.27-alpine
    container_name: stacka-reverse-proxy
    restart: unless-stopped
    depends_on:
      - seafile
      - seadoc
    ports:
      - "127.0.0.1:80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - stacka

  seafile:
    image: ghcr.io/btreemap/dockerfiles:seafile
    container_name: seafile
    restart: unless-stopped
    depends_on:
      seafile-mysql:
        condition: service_healthy
      seafile-redis:
        condition: service_started
      seafile-elasticsearch:
        condition: service_started
    volumes:
      - ./seafile:/shared
      - ./seafile-data:/shared/seafile/seafile-data
    environment:
      INIT_SEAFILE_MYSQL_ROOT_PASSWORD: example-root-password
      SEAFILE_MYSQL_DB_HOST: seafile-mysql
      SEAFILE_MYSQL_DB_PORT: "3306"
      SEAFILE_MYSQL_DB_USER: seafile
      SEAFILE_MYSQL_DB_PASSWORD: example-seafile-password
      SEAFILE_MYSQL_DB_CCNET_DB_NAME: ccnet_db
      SEAFILE_MYSQL_DB_SEAFILE_DB_NAME: seafile_db
      SEAFILE_MYSQL_DB_SEAHUB_DB_NAME: seahub_db
      TIME_ZONE: Etc/UTC
      INIT_SEAFILE_ADMIN_EMAIL: admin@example.com
      INIT_SEAFILE_ADMIN_PASSWORD: example-admin-password
      SEAFILE_SERVER_HOSTNAME: localhost
      SEAFILE_SERVER_PROTOCOL: http
      SITE_ROOT: /
      NON_ROOT: "false"
      JWT_PRIVATE_KEY: example-jwt-private-key-please-change-for-anything-real
      SEAFILE_LOG_TO_STDOUT: "true"
      ENABLE_GO_FILESERVER: "true"
      ENABLE_SEADOC: "true"
      SEADOC_SERVER_URL: http://localhost/sdoc-server
      CACHE_PROVIDER: redis
      REDIS_HOST: seafile-redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: example-redis-password
      ENABLE_NOTIFICATION_SERVER: "false"
      ENABLE_SEAFILE_AI: "false"
      MD_FILE_COUNT_LIMIT: "100000"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:80/ >/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
    networks:
      - stacka

  seadoc:
    image: ghcr.io/btreemap/dockerfiles:seadoc
    container_name: seadoc
    restart: unless-stopped
    depends_on:
      seafile-mysql:
        condition: service_healthy
      seafile:
        condition: service_started
    volumes:
      - ./seadoc:/shared
    environment:
      DB_HOST: seafile-mysql
      DB_PORT: "3306"
      DB_USER: seafile
      DB_PASSWORD: example-seafile-password
      DB_NAME: seahub_db
      TIME_ZONE: Etc/UTC
      JWT_PRIVATE_KEY: example-jwt-private-key-please-change-for-anything-real
      NON_ROOT: "false"
      SEAHUB_SERVICE_URL: http://seafile
    expose:
      - "23333"
    networks:
      - stacka

  seafile-elasticsearch:
    image: ghcr.io/btreemap/dockerfiles:elasticsearch-9
    container_name: seafile-elasticsearch
    restart: unless-stopped
    environment:
      discovery.type: single-node
      bootstrap.memory_lock: "true"
      ES_JAVA_OPTS: -Xms1g -Xmx1g
      xpack.security.enabled: "false"
    ulimits:
      memlock:
        soft: -1
        hard: -1
    mem_limit: 2g
    volumes:
      - ./elasticsearch:/usr/share/elasticsearch/data
    networks:
      - stacka

  seafile-mysql:
    image: ghcr.io/btreemap/dockerfiles:mariadb-12
    container_name: seafile-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: example-root-password
      MYSQL_LOG_CONSOLE: "true"
      MARIADB_AUTO_UPGRADE: "1"
    volumes:
      - ./mysql:/var/lib/mysql
    healthcheck:
      test: ["CMD", "/usr/local/bin/healthcheck.sh", "--connect", "--mariadbupgrade", "--innodb_initialized"]
      interval: 20s
      start_period: 30s
      timeout: 5s
      retries: 10
    networks:
      - stacka

  seafile-redis:
    image: ghcr.io/btreemap/dockerfiles:redis-8
    container_name: seafile-redis
    restart: unless-stopped
    command: ["/bin/sh", "-c", "redis-server --requirepass \"example-redis-password\""]
    networks:
      - stacka

networks:
  stacka:
    name: stacka
